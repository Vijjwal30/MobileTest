name: Build Android App (Gluon Certified Toolchain)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Patched Gluon GraalVM
        # This action sets up the correct cross-compilation caches for Android
        uses: gluonhq/setup-graalvm@master
        with:
          # Upgrading from 22.1 to 22.3 brings in the native patch for cgroups v2
          graalvm: '22.3.r17-HotSpot'
          jdk: 'java17'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java Tooling Fallback
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Install Android Native System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl-dev libgtk-3-dev libpango1.0-dev libxtst-dev

      - name: Compile and Package Android APK
        run: |
          export ANDROID_SDK=$ANDROID_HOME
          mvn clean gluonfx:build gluonfx:package -Pandroid

      - name: Upload Android Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk
