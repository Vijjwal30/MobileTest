name: Build Android App (Gluon Certified Toolchain)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Gluon's GraalVM
        uses: gluonhq/setup-graalvm@master
        with:
          graalvm: '22.1.0.1-Final'
          jdk: 'java17'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
          cache: 'maven'

      - name: Setup Android NDK
        # Gluon's build infrastructure requires an explicit Android NDK toolchain link
        uses: nttld/setup-ndk@v1
        id: setup-ndk
        with:
          ndk-version: r28c
          add-to-path: false

      - name: Install Native Tooling Libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl-dev libgtk-3-dev libpango1.0-dev libxtst-dev

      - name: Compile and Package Android APK
        # The GRAALVM_ARGS flag forces Gluon Substrate to skip the broken cgroups tracking code
        env:
          ANDROID_SDK: ${{ env.ANDROID_HOME }}
          ANDROID_NDK: ${{ steps.setup-ndk.outputs.ndk-path }}
          GRAALVM_ARGS: "-Djdk.internal.platform.container=none"
        run: |
          mvn clean gluonfx:build gluonfx:package -Pandroid

      - name: Upload Android Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk
