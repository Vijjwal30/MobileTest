name: Build Android App (Gluon Certified Toolchain)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java 21 Tooling Environment
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Setup Official Gluon GraalVM
        # Corrected action repository name
        uses: gluonhq/setup-graalvm@v1
        with:
          # Pulls the exact custom GraalVM fork built specifically for mobile substrates
          release: 'latest'

      - name: Install Android Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev

      - name: Compile and Package Android APK
        # Runs clean compile inside the verified environment sandbox
        run: mvn clean gluonfx:build gluonfx:package -Pandroid

      - name: Upload Android Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk
