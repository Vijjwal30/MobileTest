name: Build Android App (Java 25 / JavaFX 26 - Maven)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup GraalVM for Java 25
        # This relies on the official GraalVM action to cleanly provision your JDK 25 environment
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '25'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Install Android Native Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libswscale-dev

      - name: Compile and Package Android APK
        # The build plugin handles substrate translation locally
        run: mvn gluonfx:build gluonfx:package -Pandroid

      - name: Upload Android Package Artifact
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: target/gluonfx/aarch64-android/gvm/*.apk
