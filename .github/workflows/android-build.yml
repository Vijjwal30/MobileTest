name: Build Android App (Gluon Certified Toolchain)

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Patched Mobile GraalVM Toolchain
        # Bypassing the buggy gluonhq action completely to fix the cgroups crash
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '17'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          cache: 'maven'

      - name: Install Android Native System Dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libavcodec-dev libavformat-dev libavutil-dev libgl-dev libgtk-3-dev libpango1.0-dev libxtst-dev

      - name: Compile and Package Android APK
        # The GRAALVM_HOME variable tells the gluonfx plugin to use this patched environment
        run: |
          export GRAALVM_HOME=$JAVA_HOME
          export ANDROID_SDK=$ANDROID_HOME
          mvn clean gluonfx:build gluonfx:package -Pandroid
